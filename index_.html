<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkApp - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-config.js"></script>
    <script src="auth.js"></script>
    
    <style>
        /* ... (stili precedenti conservati) ... */
        .login-container { background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; text-align: center; }
        .input-group { display: flex; align-items: center; background: #f8fafc; border-radius: 12px; padding: 0 15px; margin-bottom: 15px; border: 2px solid #e2e8f0; transition: border-color 0.2s; }
        .form-input { flex: 1; padding: 15px; border: none; background: transparent; font-size: 1rem; outline: none; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* STILE MODALE SUPERVISORE */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-content { background: white; border-radius: 24px; padding: 2rem; max-width: 400px; width: 100%; text-align: center; animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-btn { padding: 18px; border-radius: 15px; border: 2px solid #e2e8f0; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; width: 100%; cursor: pointer; transition: all 0.2s; background: white; text-align: left; }
        .modal-btn:hover { border-color: var(--primary); background: #f0f9ff; }
        .modal-btn b { display: block; font-size: 1.1rem; color: #1e293b; }
        .modal-btn span.desc { font-size: 0.85rem; color: #64748b; font-weight: 400; }
        .modal-btn i { font-size: 2.5rem; color: var(--primary); }
    </style>
</head>
<body class="bg-app">
    <div class="app-container" style="justify-content: center;">
        
        <div class="login-container">
            <div id="message-container"></div>
            
            <div id="vista-login-completo">
                <div style="margin-bottom: 2rem;">
                    <span class="material-symbols-rounded" style="font-size: 4rem; color: var(--primary);">shield_person</span>
                    <h1 style="font-size: 1.8rem; font-weight: 800; margin: 0; color: var(--primary);">ParkApp</h1>
                    <p style="color: #64748b;">Accedi al sistema</p>
                </div>

                <form onsubmit="event.preventDefault(); gestisciLogin();">
                    <div class="input-group">
                        <span class="material-symbols-rounded">mail</span>
                        <input type="email" id="email" placeholder="Email" class="form-input" required>
                    </div>
                    <div class="input-group">
                        <span class="material-symbols-rounded">lock</span>
                        <input type="password" id="password" placeholder="Password" class="form-input" required>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-login">ACCEDI</button>
                </form>
            </div>

            <div id="vista-login-pin" style="display: none;">
                <div style="margin-bottom: 2rem;">
                    <h1 style="font-size: 1.5rem;">Bentornato!</h1>
                    <p id="nome-bentornato" style="font-weight: 600; color: var(--primary);"></p>
                </div>
                <form onsubmit="event.preventDefault(); gestisciLoginPinUI();">
                    <div class="input-group" style="max-width: 200px; margin: 0 auto 15px;">
                        <input type="password" id="pin" placeholder="PIN" maxlength="4" class="form-input" style="text-align: center; letter-spacing: 5px;" inputmode="numeric">
                    </div>
                    <button type="submit" class="btn-primary" id="btn-pin">SBLOCCA</button>
                </form>
                <a onclick="resetDispositivo()" style="font-size: 0.8rem; color: #64748b; cursor: pointer; text-decoration: underline; display: block; margin-top: 1rem;">Usa un altro account</a>
            </div>
        </div>
    </div>

    <div id="modal-supervisore" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: #1e293b;">Benvenuto Supervisore</h2>
            <p style="color: #64748b; margin-bottom: 2rem;">Scegli come vuoi operare oggi:</p>
            
            <button class="modal-btn" onclick="window.location.href='menu.html'">
                <i class="material-symbols-rounded">smartphone</i>
                <div>
                    <b>App Mobile</b>
                    <span class="desc">Per l'uso sul campo e veicoli</span>
                </div>
            </button>

            <button class="modal-btn" onclick="window.location.href='admin_database.html'">
                <i class="material-symbols-rounded">desktop_windows</i>
                <div>
                    <b>Console PC</b>
                    <span class="desc">Gestione dati e reportistica</span>
                </div>
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailSalvata = localStorage.getItem('dispositivo_email');
            if (emailSalvata) {
                document.getElementById('vista-login-completo').style.display = 'none';
                document.getElementById('vista-login-pin').style.display = 'block';
                document.getElementById('nome-bentornato').textContent = localStorage.getItem(`nome_${emailSalvata}`);
            }
        });

        async function gestisciLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            
            btn.disabled = true;
            btn.textContent = "VERIFICA...";

            const res = await authLoginCompleto(email, password);
            
            if (res.success) {
                const utente = authGetUtente();
                smistaUtente(utente);
            } else {
                alert("Errore: " + res.error);
                btn.disabled = false;
                btn.textContent = "ACCEDI";
            }
        }

        async function gestisciLoginPinUI() {
            const pin = document.getElementById('pin').value;
            const res = await authLoginPin(pin);
            if (res.success) {
                const utente = authGetUtente();
                smistaUtente(utente);
            } else {
                alert("PIN Errato");
            }
        }

        // LA LOGICA DI SMISTAMENTO INTELLIGENTE
        function smistaUtente(utente) {
            const ruolo = (utente.ruolo || 'tecnico').toLowerCase();
            
            if (ruolo === 'admin') {
                // Admin: Diretto alla console
                window.location.href = 'admin_database.html';
            } 
            else if (ruolo === 'supervisore') {
                // Supervisore: Mostra il modale di scelta
                document.getElementById('modal-supervisore').style.display = 'flex';
            } 
            else {
                // Tecnico: Logica standard (Profilo se primo accesso, altrimenti Menu)
                // Se password è quella temporanea, forza il profilo
                const passInserita = document.getElementById('password').value;
                if (utente.pin === '1234' || passInserita === 'Esa123!') {
                    window.location.href = 'profilo.html?primo_access=true';
                } else {
                    window.location.href = 'menu.html';
                }
            }
        }

        function resetDispositivo() {
            authScollegaDispositivo();
            window.location.reload();
        }
    </script>
</body>
</html>
