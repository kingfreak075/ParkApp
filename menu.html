<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu - ParkApp</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-config.js"></script>
    <script src="auth.js"></script>
    <script src="check-db-config.js"></script>
</head>
<body class="bg-app">
    <div class="app-container">
        <header class="app-header">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <div>
                    <h1 style="font-size: 1.2rem; font-weight: 800; margin: 0;">Bentornato,</h1>
                    <div id="nome-tecnico" style="font-size: 1.1rem; color: var(--primary); font-weight: 700;">-</div>
                </div>
                
                <div style="display: flex; align-items: center; gap: 5px;">
                    <div id="role-badge" style="padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: white; letter-spacing: 0.5px; display: none;">
                        -
                    </div>

                    <button onclick="window.location.href='profilo.html'" 
                            id="profile-icon"
                            style="background: none; border: none; color: var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 50%; transition: background 0.2s;">
                        <span class="material-symbols-rounded" style="font-size: 2.2rem;">account_circle</span>
                    </button>
                    
                    <button onclick="eseguiLogout()" style="background: #fee2e2; color: #ef4444; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; margin-left: 5px;">
                        <span class="material-symbols-rounded" style="font-size: 1.3rem;">logout</span>
                    </button>
                </div>
            </div>
        </header>

        <main style="padding: 1rem; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button onclick="window.location.href='parco.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">apartment</span> PARCO
            </button>
            <button onclick="window.location.href='manutenzioni.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">build</span> MANUTENZIONE
            </button>
            <button onclick="window.location.href='gestione.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">schedule</span> GESTIONE
            </button>
            <button onclick="window.location.href='montaggi.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">construction</span> MONTAGGIO
            </button>
            <button onclick="window.location.href='agenda.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">event_note</span> AGENDA
            </button>
            <button onclick="window.location.href='calendario.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">calendar_month</span> CALENDARIO
            </button>
            <button onclick="window.location.href='gestione_veicoli.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">directions_car</span> GESTIONE AUTO
            </button>
            <button onclick="window.location.href='note_spese.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">payments</span> NOTE SPESE
            </button>
            <button onclick="window.location.href='reperibilita_tecnico.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">emergency</span> REPERIBILITÀ
            </button>
            <button onclick="window.location.href='config.html'" class="menu-item-v2">
                <span class="material-symbols-rounded">settings</span> CONFIGURAZIONE
            </button>
        </main>

       <footer class="app-footer">
    <span class="footer-text" id="footer-text"></span>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const footerEl = document.getElementById('footer-text');
        if (footerEl && window.FOOTER_CONFIG) {
            footerEl.innerText = window.FOOTER_CONFIG.testo;
        }
    });
</script>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const utente = typeof authGetUtente === 'function' ? authGetUtente() : null;
            
            if (!utente) {
                window.location.href = 'index.html';
                return;
            }
            
            // Mostra il nome
            document.getElementById('nome-tecnico').innerText = utente.nome_completo || 'Utente';
            
            // LOGICA BADGE RUOLO
            const badge = document.getElementById('role-badge');
            const ruolo = (utente.ruolo || 'tecnico').toLowerCase();
            
            badge.innerText = ruolo;
            badge.style.display = 'block';

            // Colori diversi in base al ruolo
            if (ruolo === 'admin') {
                badge.style.background = '#ef4444'; // Rosso per Admin
            } else if (ruolo === 'supervisore') {
                badge.style.background = '#f59e0b'; // Arancione per Supervisore
            } else {
                badge.style.background = '#22c55e'; // Verde per Tecnico
            }
            
            if (typeof gestisciIndicatoreDB === 'function') gestisciIndicatoreDB();
        });

        async function eseguiLogout() {
            if(confirm("Sei sicuro di voler uscire?")) {
                const supabase = typeof getSupabaseClient === 'function' ? getSupabaseClient() : null;
                if (supabase) await supabase.auth.signOut();
                if (typeof authLogout === 'function') authLogout();
                window.location.href = 'index.html';
            }
        }
    </script>

    <style>
        /* STILE TASTI MIGLIORATO */
        .menu-item-v2 {
            background: white;
            border: 2px solid #f1f5f9;
            border-radius: 18px;
            padding: 22px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            font-size: 0.75rem;
            color: #1e293b;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .menu-item-v2:active { 
            transform: scale(0.96); 
            background: #f8fafc;
            box-shadow: none;
        }
        .menu-item-v2 .material-symbols-rounded { 
            font-size: 2.2rem; 
            color: var(--primary);
            transition: transform 0.2s ease;
        }
        .menu-item-v2:hover .material-symbols-rounded {
            transform: translateY(-3px);
        }
        
        .app-header { padding: 1.2rem; background: white; border-bottom: 1px solid #f1f5f9; }
    </style>
</body>
</html>
