<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ParkApp - Profilo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db-config.js"></script>
    <script src="auth.js"></script>
    <style>
        .profile-card { background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; }
        .avatar { width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; margin-right: 15px; }
        .section-title { font-size: 0.9rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        .input-mini { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; margin-bottom: 15px; outline: none; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 1rem; display: none; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body class="bg-app">
    <div class="app-container">
       <header class="main-header" style="display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; background: var(--primary); color: white;">
    <button onclick="window.location.href='menu.html'" style="background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; padding: 5px;">
        <span class="material-symbols-rounded" style="font-size: 28px;">chevron_left</span>
        <span style="font-weight: 600; font-size: 1rem;">Menu</span>
    </button>
    <h1 style="margin: 0; font-size: 1.1rem; position: absolute; left: 50%; transform: translateX(-50%); pointer-events: none;">Profilo</h1>
    <div style="width: 50px;"></div> </header>

        <div class="content" style="padding: 1rem;">
            <div id="alert" class="alert"></div>

            <div class="profile-card" style="display:flex; align-items:center;">
                <div class="avatar" id="avatar">?</div>
                <div>
                    <h2 id="nome" style="margin:0; font-size:1.1rem;">-</h2>
                    <p id="ruolo" style="margin:0; font-size:0.8rem; color:var(--primary); font-weight:700;"></p>
                </div>
            </div>

            <div class="profile-card">
                <div class="section-title"><span class="material-symbols-rounded">dialpad</span> Sicurezza PIN</div>
                <input type="password" id="pin-old" placeholder="PIN Attuale" maxlength="4" class="input-mini">
                <input type="password" id="pin-new" placeholder="Nuovo PIN (4 cifre)" maxlength="4" class="input-mini">
                <button onclick="cambiaPin()" class="btn-save">Aggiorna PIN</button>
            </div>

            <div class="profile-card">
                <div class="section-title"><span class="material-symbols-rounded">lock</span> Password Account</div>
                <input type="password" id="pass-new" placeholder="Nuova Password" class="input-mini">
                <button onclick="cambiaPass()" class="btn-save">Aggiorna Password</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const u = authGetUtente();
            if (!u) { window.location.href = 'index.html'; return; }
            document.getElementById('nome').textContent = u.nome_completo;
            document.getElementById('ruolo').textContent = u.ruolo.toUpperCase();
            document.getElementById('avatar').textContent = u.nome_completo.charAt(0);
        });

        async function cambiaPin() {
            const u = authGetUtente();
            const res = await authCambiaPin(u.Mail, document.getElementById('pin-old').value, document.getElementById('pin-new').value);
            msg(res.success ? "✅ PIN Aggiornato" : "❌ " + res.error, res.success ? 'success' : 'error');
        }

        async function cambiaPass() {
            const pass = document.getElementById('pass-new').value;
            if(pass.length < 6) return msg("Password troppo corta", "error");
            const { error } = await getSupabaseClient().auth.updateUser({ password: pass });
            if (!error) {
                const email = localStorage.getItem('dispositivo_email');
                localStorage.setItem(`password_${email}`, pass);
                msg("✅ Password Aggiornata", "success");
            } else { msg("❌ " + error.message, "error"); }
        }

        function msg(t, tipo) {
            const a = document.getElementById('alert');
            a.textContent = t;
            a.style.display = 'block';
            a.style.background = tipo === 'success' ? '#dcfce7' : '#fee2e2';
            setTimeout(() => a.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
